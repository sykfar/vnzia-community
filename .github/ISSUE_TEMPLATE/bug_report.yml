name: Bug Report
description: Melde ein Problem oder unerwartetes Verhalten in Vnzia.
title: "[Bug] "
labels:
  - bug
  - "status: needs-review"
body:
  - type: markdown
    attributes:
      value: |
        Danke für deine Meldung! Je konkreter die Beschreibung, desto schneller lässt sich das Problem nachvollziehen.

        **Bitte keine privaten Daten:** keine Reisepläne, Standorte, Buchungsdaten, Zugangsdaten, Tokens oder Roh-Logs.

        **Sicherheitsrelevant?** Wenn dein Hinweis Kontozugriff, Berechtigungen, private Daten, Zahlungen oder eine
        mögliche Sicherheitslücke betrifft, erstelle **kein öffentliches Issue** — nutze die vertrauliche Meldung
        unter dem Reiter **Security** (siehe [SECURITY.md](../blob/main/SECURITY.md)).
  - type: textarea
    id: beobachtet
    attributes:
      label: Was ist passiert?
      description: Beschreibe das beobachtete Verhalten.
      placeholder: "Als ich …, hat die App …"
    validations:
      required: true
  - type: textarea
    id: erwartet
    attributes:
      label: Was hättest du erwartet?
    validations:
      required: false
  - type: textarea
    id: reproduktion
    attributes:
      label: Wie lässt sich das Problem wiederholen?
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: false
  - type: dropdown
    id: haeufigkeit
    attributes:
      label: Häufigkeit
      options:
        - Einmalig
        - Gelegentlich
        - Immer
        - Unbekannt
    validations:
      required: true
  - type: dropdown
    id: produktbereich
    attributes:
      label: Produktbereich
      options:
        - Reiseplanung
        - Karten und Orte
        - Community und Social Travel
        - Reiseblog und Inspiration
        - Mobile Experience
        - KI-Agenten
        - Performance und Zuverlässigkeit
        - Datenschutz und Sicherheit
        - Barrierefreiheit
    validations:
      required: false
  - type: input
    id: umgebung
    attributes:
      label: Gerät und Version
      description: "Optional: Gerätefamilie, Betriebssystem und App-Version (z. B. iPhone, iOS 26, Vnzia 1.3 (115))."
    validations:
      required: false
